<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Eid Greeting Card Generator - Personalize & Download</title>
    <meta name="description" content="Create beautiful, personalized Eid Mubarak greeting cards with your name. Choose from stunning modern and traditional templates, customize typography, drag text to place it, and download in high resolution.">
    <!-- Google Fonts for exquisite styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Reem+Kufi:wght@400..700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styleheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <header class="app-header">
                <div class="logo-area">
                    <span class="mosque-icon"><i class="fa-solid fa-mosque"></i></span>
                    <h1>Eid Greeting</h1>
                </div>
                <p class="tagline">Personalize & Share Beautiful Wishes</p>
            </header>

            <main class="controls-form">
                <!-- Section 1: Template Selection -->
                <section class="control-group">
                    <h2 class="section-title"><span class="step-num">1</span> Choose Template</h2>
                    <div class="templates-grid">
                        <button type="button" class="template-btn active" id="btn-tmpl-1" data-template="tmpl-1" aria-label="Royal Night Template">
                            <span class="tmpl-thumb tmpl-thumb-1"></span>
                            <span class="tmpl-name">Royal Night</span>
                        </button>
                        <button type="button" class="template-btn" id="btn-tmpl-2" data-template="tmpl-2" aria-label="Emerald Grace Template">
                            <span class="tmpl-thumb tmpl-thumb-2"></span>
                            <span class="tmpl-name">Emerald Grace</span>
                        </button>
                        <button type="button" class="template-btn" id="btn-tmpl-3" data-template="tmpl-3" aria-label="Sunset Blessings Template">
                            <span class="tmpl-thumb tmpl-thumb-3"></span>
                            <span class="tmpl-name">Sunset Gold</span>
                        </button>
                        <button type="button" class="template-btn" id="btn-tmpl-4" data-template="tmpl-4" aria-label="Minimalist Rose Template">
                            <span class="tmpl-thumb tmpl-thumb-4"></span>
                            <span class="tmpl-name">Pastel Rose</span>
                        </button>
                    </div>
                </section>

                <!-- Section 2: Personalization -->
                <section class="control-group">
                    <h2 class="section-title"><span class="step-num">2</span> Personalization</h2>
                    
                    <div class="input-wrapper">
                        <label for="input-name">Your Name / Family Name</label>
                        <div class="input-icon-group">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="input-name" placeholder="E.g., Ahmad & Family" maxlength="40" value="Ahmad & Family">
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <label for="select-greeting-preset">Greeting Phrase</label>
                        <select id="select-greeting-preset">
                            <option value="Eid Mubarak" selected>Eid Mubarak (عيد مبارك)</option>
                            <option value="Kullu 'Am Wa Antum Bi-Khair">Kullu 'Am Wa Antum Bi-Khair (كل عام وأنتم بخير)</option>
                            <option value="Happy Eid al-Fitr">Happy Eid al-Fitr</option>
                            <option value="May this Eid bring endless joy and peace to you and your loved ones.">Warm Wishes & Blessings</option>
                            <option value="custom">✏️ Write Custom Greeting...</option>
                        </select>
                    </div>

                    <div class="input-wrapper hidden" id="custom-greeting-wrapper">
                        <label for="input-custom-greeting">Custom Greeting</label>
                        <textarea id="input-custom-greeting" placeholder="Type your custom blessing here..." maxlength="120" rows="2"></textarea>
                    </div>
                </section>

                <!-- Section 3: Styling -->
                <section class="control-group">
                    <h2 class="section-title"><span class="step-num">3</span> Customize Design</h2>
                    
                    <div class="input-row">
                        <div class="input-wrapper half">
                            <label for="select-font">Font Style</label>
                            <select id="select-font">
                                <option value="Cinzel">Serif (Cinzel)</option>
                                <option value="Amiri">Arabic Elegance (Amiri)</option>
                                <option value="Reem Kufi">Arabic Kufi (Reem Kufi)</option>
                                <option value="Playfair Display">Classic (Playfair)</option>
                                <option value="Montserrat">Modern (Montserrat)</option>
                            </select>
                        </div>
                        <div class="input-wrapper half">
                            <label for="input-font-size">Text Size</label>
                            <div class="slider-container">
                                <input type="range" id="input-font-size" min="20" max="80" value="48">
                                <span id="size-val" class="slider-val">48px</span>
                            </div>
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <label>Text Color</label>
                        <div class="color-palette">
                            <button type="button" class="color-btn active" data-color="#D4AF37" style="background: linear-gradient(135deg, #FFF 0%, #D4AF37 50%, #AA7C11 100%);" aria-label="Premium Gold"></button>
                            <button type="button" class="color-btn" data-color="#FFFFFF" style="background-color: #FFFFFF;" aria-label="Pure White"></button>
                            <button type="button" class="color-btn" data-color="#F2C94C" style="background-color: #F2C94C;" aria-label="Sunny Gold"></button>
                            <button type="button" class="color-btn" data-color="#56CCF2" style="background-color: #56CCF2;" aria-label="Soft Blue"></button>
                            <button type="button" class="color-btn" data-color="#EB5757" style="background-color: #EB5757;" aria-label="Soft Rose"></button>
                            <div class="color-picker-wrapper">
                                <input type="color" id="input-custom-color" value="#D4AF37" aria-label="Custom Color Picker">
                                <span class="picker-icon"><i class="fa-solid fa-palette"></i></span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section 4: Actions -->
                <section class="actions-group">
                    <button type="button" id="btn-download" class="btn btn-primary btn-block">
                        <span class="btn-icon"><i class="fa-solid fa-arrow-down-to-bracket"></i></span>
                        Download Card (PNG)
                    </button>
                </section>
            </main>

            <footer class="sidebar-footer">
                <p>Designed with ❤️ for a blessed Eid</p>
            </footer>
        </aside>

        <!-- Main Display / Preview Area -->
        <main class="preview-area">
            <div class="preview-header">
                <div class="drag-hint">
                    <span class="hint-icon"><i class="fa-solid fa-arrows-up-down-left-right"></i></span>
                    <p>Interactive Canvas: Drag the Name or Greeting on the card to place them anywhere!</p>
                </div>
            </div>

            <div class="canvas-viewport">
                <div class="canvas-wrapper">
                    <!-- Standard High-Resolution square canvas for Instagram/WhatsApp -->
                    <canvas id="greetingCanvas" width="1200" height="1200"></canvas>
                </div>
            </div>

            <div class="mobile-actions">
                <button type="button" id="btn-download-mobile" class="btn btn-primary btn-block">
                    <span class="btn-icon"><i class="fa-solid fa-arrow-down-to-bracket"></i></span>
                    Download Card
                </button>
            </div>
        </main>
    </div>
</body>
</html>
